# ==========================================================
# APPLICATION
# ==========================================================
spring.application.name=${API_GATEWAY_NAME:api-gateway}
server.port=${PORT:8080}

spring.profiles.active=dev

spring.main.web-application-type=reactive
spring.main.allow-bean-definition-overriding=true

# ==========================================================
# APPLICATION INFO
# ==========================================================
info.app.name=Elearn App
info.app.version=1.0.0
info.app.description=A Spring Boot application for online learning

# ==========================================================
# EUREKA
# ==========================================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

# ==========================================================
# CORS
# ==========================================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# ==========================================================
# SWAGGER
# ==========================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=Course Service
springdoc.swagger-ui.urls[1].url=/course-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=Notification Service
springdoc.swagger-ui.urls[2].url=/notification-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=Purchase Service
springdoc.swagger-ui.urls[3].url=/purchase-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=Review Service
springdoc.swagger-ui.urls[4].url=/review-service/v3/api-docs

# ==========================================================
# ACTUATOR
# ==========================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=always